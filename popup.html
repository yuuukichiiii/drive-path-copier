<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: "Segoe UI", "Yu Gothic UI", sans-serif;
      font-size: 13px;
      background: #fff;
      color: #202124;
    }

    /* ── ヘッダー ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 10px;
      border-bottom: 1px solid #e8eaed;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #1a73e8;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #5f6368;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      font-size: 16px;
      transition: background 0.15s;
    }
    .icon-btn:hover { background: #f1f3f4; color: #202124; }

    /* ── メインビュー ── */
    #main-view { padding: 14px 16px 16px; }
    #copy-btn {
      width: 100%;
      padding: 9px 16px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    #copy-btn:hover { background: #1557b0; }
    #copy-btn:disabled { background: #9aa0a6; cursor: default; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #5f6368;
      line-height: 1.5;
      min-height: 18px;
    }
    #status.error { color: #d93025; }
    #status.success { color: #1e8e3e; font-weight: 500; }
    #path-box {
      display: none;
      margin-top: 8px;
      padding: 8px 10px;
      background: #f1f3f4;
      border-radius: 4px;
      font-family: monospace;
      font-size: 11px;
      color: #202124;
      word-break: break-all;
    }

    /* ── 設定ビュー ── */
    #settings-view { display: none; padding: 14px 16px 16px; }
    .settings-title {
      font-size: 13px;
      font-weight: 600;
      color: #202124;
      margin-bottom: 12px;
    }
    .settings-desc {
      font-size: 11.5px;
      color: #5f6368;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .mapping-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: #f8f9fa;
      border-radius: 4px;
      margin-bottom: 6px;
      font-size: 12px;
    }
    .mapping-email { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mapping-letter {
      font-family: monospace;
      font-weight: 600;
      color: #1a73e8;
      min-width: 24px;
      text-align: center;
    }
    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #9aa0a6;
      font-size: 13px;
      padding: 2px 4px;
      border-radius: 3px;
      line-height: 1;
    }
    .delete-btn:hover { color: #d93025; background: #fce8e6; }
    .no-mapping {
      font-size: 12px;
      color: #9aa0a6;
      text-align: center;
      padding: 10px 0;
    }
    .add-row {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      align-items: center;
    }
    .add-row input[type="text"] {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 12px;
      outline: none;
    }
    .add-row input[type="text"]:focus { border-color: #1a73e8; }
    .letter-input {
      width: 40px !important;
      flex: none !important;
      text-align: center;
      font-family: monospace;
      font-weight: 600;
      text-transform: uppercase;
    }
    .add-mapping-btn {
      padding: 6px 10px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .add-mapping-btn:hover { background: #1557b0; }
    .add-label {
      font-size: 11.5px;
      color: #5f6368;
      margin-top: 8px;
      display: flex;
      gap: 4px;
    }
    .add-label span { flex: 1; text-align: center; }
    .add-label span:last-child { flex: none; width: 40px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="#1a73e8">
        <path d="M19 11H7.83l4.88-4.88c.39-.39.39-1.03 0-1.42-.39-.39-1.02-.39-1.41 0l-6.59 6.59c-.39.39-.39 1.02 0 1.41l6.59 6.59c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41L7.83 13H19c.55 0 1-.45 1-1s-.45-1-1-1z"/>
      </svg>
      Drive Path Copier
    </h1>
    <button class="icon-btn" id="settings-btn" title="設定">⚙️</button>
  </div>

  <!-- メインビュー -->
  <div id="main-view">
    <button id="copy-btn">📋 Windowsパスをコピー</button>
    <div id="status">Drive のフォルダを開いた状態でクリックしてください</div>
    <div id="path-box"></div>
  </div>

  <!-- 設定ビュー -->
  <div id="settings-view">
    <div class="settings-title">ドライブ文字の設定</div>
    <div class="settings-desc">
      Googleアカウントごとに割り当てるドライブ文字を設定します。<br>
      未設定のアカウントは <b>G:</b> が使われます。
    </div>
    <div id="mapping-list"></div>
    <div class="add-label">
      <span>メールアドレス</span>
      <span>文字</span>
      <span style="width:36px"></span>
    </div>
    <div class="add-row">
      <input type="text" id="add-email" placeholder="example@gmail.com">
      <input type="text" id="add-letter" class="letter-input" placeholder="G" maxlength="1">
      <button class="add-mapping-btn" id="add-mapping-btn">追加</button>
    </div>
    <div style="margin-top:14px;">
      <button class="icon-btn" id="back-btn" style="font-size:13px;gap:4px;color:#1a73e8;">
        ← メイン画面に戻る
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
